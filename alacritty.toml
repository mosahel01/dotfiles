[font]
size = 13.3
offset = { x = -1, y = 1 } # x: line spacing, y: letter spacing

# JetBrainsMono Nerd Font

[font.normal]
family = "Berkeley Mono Nerd Font"
style = "Regular"

[font.bold]
family = "Berkeley Mono Nerd Font"
style = "Bold"

[font.italic]
family = "Berkeley Mono Nerd Font"
style = "italic"

[font.bold_italic]
family = "Berkeley Mono Nerd Font"
style = "bold_italic"

[window.padding] 
x = 0
y = 0

[selection]
save_to_clipboard = true

[colors.primary]
background = "#000000"
foreground = "#ffffff"


[scrolling]
history = 10000
multiplier = 10

[env]
TERM = "xterm-256color"

