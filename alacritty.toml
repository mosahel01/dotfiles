[font]
size = 13.0
offset = { x = 0, y = 0 } # x: line spacing, y: letter spacing

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[window]
opacity = 0.85
blur = true

[window.padding] 
x = 0
y = 0

[selection]
save_to_clipboard = true

# [keyboard]
# bindings = {
#     { key = "C", mods = "Control", action = "Copy" },
#     { key = "V", mods = "Control", action = "Paste" },
#     { key = "C", mods = "Control|Shift", chars = "\u0003"},
# }

[colors.primary]
background = "#000000"
foreground = "#ffffff"


[scrolling]
history = 10000
multiplier = 10

[env]
TERM = "xterm-256color"
