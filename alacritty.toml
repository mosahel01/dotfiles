[font]
size = 14.3
offset = { x = -1, y = 1 } # x: line spacing, y: letter spacing

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "bold_italic"

[window.padding] 
x = 0
y = 0

[selection]
save_to_clipboard = true

[colors.primary]
background = "#212122"
# foreground = "#ffffff"

[scrolling]
history = 10000
multiplier = 10

[env]
TERM = "xterm-256color"

