<?xml version='1.0' encoding='UTF-8'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
	<!-- Global rendering settings -->
	<match target="font">
		<edit mode="assign" name="antialias">
			<bool>true</bool>
		</edit>
		<edit mode="assign" name="hinting">
			<bool>true</bool>
		</edit>
		<edit mode="assign" name="hintstyle">
			<const>hintslight</const>
		</edit>
		<!-- disabled autohint so native font instructions work correctly -->
		<edit mode="assign" name="autohint">
			<bool>false</bool>
		</edit>
		<edit mode="assign" name="rgba">
			<const>rgb</const>
		</edit>
		<edit mode="assign" name="lcdfilter">
			<const>lcddefault</const>
		</edit>
	</match>
	<!-- monospace -->
	<alias>
		<family>monospace</family>
		<prefer>
			<!-- primary coding fonts -->
			<family>Berkeley Mono</family>
			<family>Berkeley Mono Variable</family>
			<family>Iosevka</family>
			<family>Iosevka Term</family>
			<family>Iosevka Fixed</family>
			<family>JetBrains Mono</family>
			<family>JetBrains Mono Nerd Font</family>
			<family>Fira Code</family>
			<family>MesloLGS NF</family>
			<!-- nerd fallback -->
			<family>FiraCode Nerd Font Mono</family>
			<!-- wide Unicode coverage -->
			<family>Noto Sans Mono</family>
			<!-- emoji -->
			<family>Noto Color Emoji</family>
			<family>Noto Emoji</family>
		</prefer>
	</alias>
	<!-- sans-serif fonts -->
	<alias>
		<family>sans-serif</family>
		<prefer>
			<family>Google Sans</family>
			<family>Ubuntu</family>
			<family>Fira Sans</family>
			<family>Noto Sans</family>
			<family>Noto Color Emoji</family>
			<family>Noto Emoji</family>
		</prefer>
	</alias>
	<!-- serif fonts -->
	<alias>
		<family>serif</family>
		<prefer>
			<family>Noto Serif</family>
			<family>Noto Color Emoji</family>
			<family>Noto Emoji</family>
		</prefer>
	</alias>
	<!-- fun / cursive -->
	<alias>
		<family>cursive</family>
		<prefer>
			<family>Comic Sans MS</family>
		</prefer>
	</alias>
	<match target="font">
		<edit mode="assign" name="hinting">
			<bool>true</bool>
		</edit>
	</match>
	<match target="font">
		<edit mode="assign" name="hintstyle">
			<const>hintslight</const>
		</edit>
	</match>
	<dir>~/.local/share/fonts</dir>
	<match target="font">
		<edit mode="assign" name="antialias">
			<bool>true</bool>
		</edit>
	</match>
</fontconfig>
